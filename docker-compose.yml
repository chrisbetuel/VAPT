version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

x-healthcheck: &healthcheck-base
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:
  # ============================================================================
  # API Gateway / Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: vapt-nginx
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/sites:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/app/static
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - vapt-network
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # Frontend - React 18 + TypeScript + Vite
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${ENVIRONMENT:-development}
    container_name: vapt-frontend
    env_file:
      - .env
      - .env.${ENVIRONMENT:-development}
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - vapt-network
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # Backend - FastAPI (Python 3.11+)
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${ENVIRONMENT:-development}
    container_name: vapt-backend
    env_file:
      - .env
      - .env.${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app:delegated
      - static_volume:/app/static
      - reports_volume:/app/reports
      - screenshots_volume:/app/screenshots
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - vapt-network
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # Celery Worker - Scan Execution
  # ============================================================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${ENVIRONMENT:-development}
    container_name: vapt-celery-worker
    command: celery -A app.core.celery_app worker --loglevel=${LOG_LEVEL:-info} --concurrency=${CELERY_WORKER_CONCURRENCY:-4} -E
    env_file:
      - .env
      - .env.${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app:delegated
      - reports_volume:/app/reports
      - screenshots_volume:/app/screenshots
      - ./wordlists:/wordlists:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - vapt-network
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # Celery Beat - Scheduled Tasks
  # ============================================================================
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${ENVIRONMENT:-development}
    container_name: vapt-celery-beat
    command: celery -A app.core.celery_app beat --loglevel=${LOG_LEVEL:-info} --scheduler celery.beat.PersistentScheduler
    env_file:
      - .env
      - .env.${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app:delegated
      - reports_volume:/app/reports
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - vapt-network
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # PostgreSQL 15 + TimescaleDB
  # ============================================================================
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: vapt-postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - vapt-network
    healthcheck:
      <<: *healthcheck-base
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vapt_user} -d ${POSTGRES_DB:-vapt}"]
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # Redis - Cache, Session, Celery Broker
  # ============================================================================
  redis:
    image: redis:7.2-alpine
    container_name: vapt-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - vapt-network
    healthcheck:
      <<: *healthcheck-base
      test: ["CMD", "redis-cli", "ping"]
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # MinIO - S3-Compatible Object Storage
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: vapt-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-vapt_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-vapt_minio_secret_2024}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - vapt-network
    healthcheck:
      <<: *healthcheck-base
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    logging: *default-logging
    restart: unless-stopped

  minio_setup:
    image: minio/mc:latest
    container_name: vapt-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add vapt http://minio:9000 ${S3_ACCESS_KEY:-vapt_minio} ${S3_SECRET_KEY:-vapt_minio_secret_2024} --api S3v4;
      /usr/bin/mc mb -p vapt/vapt-reports;
      /usr/bin/mc mb -p vapt/vapt-screenshots;
      /usr/bin/mc mb -p vapt/vapt-scan-results;
      /usr/bin/mc mb -p vapt/vapt-logs;
      /usr/bin/mc policy set public vapt/vapt-reports;
      /usr/bin/mc policy set public vapt/vapt-screenshots;
      exit 0;
      "
    networks:
      - vapt-network

  # ============================================================================
  # Elasticsearch - Centralized Logging
  # ============================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: vapt-elasticsearch
    environment:
      - cluster.name=vapt-logs
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - vapt-network
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # OWASP ZAP - Web Application Scanner
  # ============================================================================
  zap:
    image: zaproxy/zap-stable:latest
    container_name: vapt-zap
    user: zap
    command: >
      zap.sh -daemon -host 0.0.0.0 -port ${SCANNER_ZAP_PORT:-8090} -config api.key=${SCANNER_ZAP_API_KEY:-change-me-zap-api-key} -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config database.recoverylog=false
    volumes:
      - zap_data:/home/zap/.ZAP
    ports:
      - "8090:8090"
    networks:
      - vapt-network
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # Flask Webhook Service - External Integration Gateway
  # ============================================================================
  flask_webhooks:
    build:
      context: ./backend
      dockerfile: flask_app/Dockerfile
    container_name: vapt-flask-webhooks
    env_file:
      - .env
      - .env.${ENVIRONMENT:-development}
    environment:
      - FLASK_PORT=5000
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-change-me-webhook-secret}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - vapt-network
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # Prometheus - Metrics Collection
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: vapt-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - vapt-network
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # Grafana - Visualization & Dashboards
  # ============================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: vapt-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - elasticsearch
    networks:
      - vapt-network
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # Kibana - Log Visualization
  # ============================================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: vapt-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - vapt-network
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # Filebeat - Log Shipping
  # ============================================================================
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: vapt-filebeat
    user: root
    volumes:
      - ./infrastructure/monitoring/elk/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - elasticsearch
    networks:
      - vapt-network
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # Redis Commander - Redis Admin UI (Development Only)
  # ============================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: vapt-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - vapt-network
    profiles:
      - dev
    logging: *default-logging
    restart: unless-stopped

  # ============================================================================
  # pgAdmin - PostgreSQL Admin UI (Development Only)
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vapt-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vapt-platform.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - vapt-network
    profiles:
      - dev
    logging: *default-logging
    restart: unless-stopped

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  elasticsearch_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  zap_data:
    driver: local
  static_volume:
    driver: local
  reports_volume:
    driver: local
  screenshots_volume:
    driver: local
  pgadmin_data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  vapt-network:
    name: vapt-network
    driver: bridge
