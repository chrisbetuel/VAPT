apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanner-pool
  labels:
    app: vapt
    component: scanner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vapt
      component: scanner
  template:
    metadata:
      labels:
        app: vapt
        component: scanner
    spec:
      nodeSelector:
        pool: scanner-pool
      containers:
        - name: scanner
          image: vapt-scanner:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: vapt-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-url
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
          resources:
            limits:
              memory: "4Gi"
              cpu: "4"
            requests:
              memory: "2Gi"
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: scanner
  labels:
    app: vapt
    component: scanner
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    app: vapt
    component: scanner
