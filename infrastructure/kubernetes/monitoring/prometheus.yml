apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: vapt
    component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:

    rule_files:
      - /etc/prometheus/rules/alerts.yml

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "backend"
        static_configs:
          - targets: ["backend:8000"]

      - job_name: "node_exporter"
        static_configs:
          - targets: ["node_exporter:9100"]

      - job_name: "cadvisor"
        static_configs:
          - targets: ["cadvisor:8088"]

      - job_name: "redis"
        static_configs:
          - targets: ["redis_exporter:9121"]

      - job_name: "postgres"
        static_configs:
          - targets: ["postgres_exporter:9187"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: vapt
    component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vapt
      component: prometheus
  template:
    metadata:
      labels:
        app: vapt
        component: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=30d
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            limits:
              memory: "2Gi"
              cpu: "1"
            requests:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: vapt
    component: prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    app: vapt
    component: prometheus
