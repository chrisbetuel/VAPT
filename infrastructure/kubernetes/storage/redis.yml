apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  labels:
    app: vapt
    component: redis
type: Opaque
stringData:
  redis-password: vapt-redis-password
  redis-url: redis://:vapt-redis-password@redis:6379/0
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: vapt
    component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: vapt
    component: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  labels:
    app: vapt
    component: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: vapt
      component: redis
  template:
    metadata:
      labels:
        app: vapt
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --requirepass
            - vapt-redis-password
            - --appendonly
            - "yes"
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
