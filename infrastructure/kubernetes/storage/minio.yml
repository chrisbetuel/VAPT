apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  labels:
    app: vapt
    component: minio
type: Opaque
stringData:
  access-key: vapt-minio-access
  secret-key: vapt-minio-secret
  minio-root-user: vapt-minio-access
  minio-root-password: vapt-minio-secret
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    app: vapt
    component: minio
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: api
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: console
  selector:
    app: vapt
    component: minio
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  labels:
    app: vapt
    component: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: vapt
      component: minio
  template:
    metadata:
      labels:
        app: vapt
        component: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          command:
            - minio
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: minio-root-password
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              memory: "2Gi"
              cpu: "1"
            requests:
              memory: "1Gi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
