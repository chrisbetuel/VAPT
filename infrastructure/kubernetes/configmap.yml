apiVersion: v1
kind: ConfigMap
metadata:
  name: vapt-config
  labels:
    app: vapt
data:
  APP_NAME: "VAPT Platform"
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  DEBUG: "false"
  CORS_ORIGINS: "*"
  API_PREFIX: "/api/v1"
  CELERY_BROKER_URL: "redis://:vapt-redis-password@redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://:vapt-redis-password@redis:6379/1"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "vapt-backups"
  ELASTICSEARCH_HOST: "elasticsearch:9200"
  SCAN_TIMEOUT_SECONDS: "3600"
  MAX_CONCURRENT_SCANS: "10"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRY_HOURS: "24"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
