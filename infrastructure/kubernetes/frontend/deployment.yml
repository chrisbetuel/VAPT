apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: vapt
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vapt
      component: frontend
  template:
    metadata:
      labels:
        app: vapt
        component: frontend
    spec:
      containers:
        - name: frontend
          image: vapt-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: vapt-config
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: vapt
    component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: vapt
    component: frontend
