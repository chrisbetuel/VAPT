apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "[vapt-logs-]YYYY.MM.DD"
    isDefault: false
    editable: false
    jsonData:
      timeField: "@timestamp"
      esVersion: 7.10.0
