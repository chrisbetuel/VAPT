name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ============================================================================
  # Lint & Type Check
  # ============================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements/*.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Backend Dependencies
        run: |
          pip install -r backend/requirements/dev.txt
          pip install ruff mypy

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Ruff Lint (Backend)
        run: ruff check backend/app

      - name: MyPy Type Check (Backend)
        run: mypy backend/app

      - name: ESLint (Frontend)
        working-directory: frontend
        run: npm run lint

      - name: TypeScript Type Check (Frontend)
        working-directory: frontend
        run: npm run typecheck

  # ============================================================================
  # Test Backend
  # ============================================================================
  test-backend:
    name: Test Backend
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:2.12-pg15
        env:
          POSTGRES_USER: vapt_user
          POSTGRES_PASSWORD: vapt_strong_password_2024
          POSTGRES_DB: vapt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements/*.txt

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements/dev.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run Backend Tests
        working-directory: backend
        env:
          ENVIRONMENT: testing
          DATABASE_URL: postgresql+asyncpg://vapt_user:vapt_strong_password_2024@localhost:5432/vapt_test
          DATABASE_SYNC_URL: postgresql+psycopg2://vapt_user:vapt_strong_password_2024@localhost:5432/vapt_test
          REDIS_URL: redis://localhost:6379/10
          SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret
        run: |
          alembic upgrade head
          pytest -v --cov=app --cov-report=xml --cov-report=term-missing -x

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend

  # ============================================================================
  # Test Frontend
  # ============================================================================
  test-frontend:
    name: Test Frontend
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Unit Tests
        working-directory: frontend
        run: npm run test -- --coverage

      - name: Run Lint
        working-directory: frontend
        run: npm run lint

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          directory: ./frontend/coverage
          flags: frontend

  # ============================================================================
  # Build & Push Docker Images
  # ============================================================================
  docker-build:
    name: Build & Push Docker Images
    needs: [test-backend, test-frontend]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - backend
          - frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Trigger Deployment
  # ============================================================================
  deploy:
    name: Deploy to Production
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            cd /opt/vapt
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f
          '
